<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzy Hub — Online Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0e;
            --surface: #0f1117;
            --border: #1f2230;
            --accent: #5865F2;
            --accent-glow: #5865F240;
            --text: #e8eaf2;
            --muted: #555870;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, #5865F215 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, #5865F210 0%, transparent 60%);
            pointer-events: none;
        }

        /* TOPBAR */
        .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 16px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
        .topbar-left { display: flex; align-items: center; gap: 10px; }
        .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .06em; line-height: 1; }
        .topbar-logo span { color: var(--accent); }
        .topbar-badge { font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: .12em; color: var(--accent); background: var(--accent-glow); padding: 3px 7px; border-radius: 4px; }
        .menu-btn { background: var(--accent-glow); border: 1px solid var(--accent); color: var(--accent); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-family: 'DM Mono', monospace; font-weight: 600; letter-spacing: .06em; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: background .15s; }
        .menu-btn:active { background: var(--accent); color: #fff; }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 24px 24px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            max-width: 360px;
            width: 100%;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            border-radius: 24px;
        }

        .title {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .title-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: .08em;
            line-height: 1;
            color: var(--accent);
            text-align: center;
        }

        .title-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: .15em;
            color: var(--muted);
            text-transform: uppercase;
            text-align: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .card-text {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }

        .discord-btn {
            display: block;
            width: 100%;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            transition: transform .15s;
        }

        .discord-btn:active { transform: scale(0.97); }

        .discord-btn img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        .footer {
            font-size: 11px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: .05em;
            text-align: center;
        }
    </style>
</head>
<body>

<header class="topbar">
    <div class="topbar-left">
        <div class="topbar-logo">UZY<span>HUB</span></div>
        <div class="topbar-badge">HOME</div>
    </div>
    <a class="menu-btn" href="https://MMT-Entertaiment.github.io/menu.html">☰ Menu</a>
</header>

<div class="main">
    <div class="container">

        <img class="logo-img"
            src="https://i.postimg.cc/c4THS4bR/Sans-titre-13-20260117134917.png"
            alt="Uzy Hub Logo">

        <div class="title">
            <div class="title-main">UZY HUB WEB SITE</div>
            <div class="title-sub">Site officiel du Uzy Hub</div>
        </div>

        <div class="card">
            <div class="card-text">
                Connectez-vous avec votre compte Administrateur pour accéder au panel Admin.
            </div>
            <button class="discord-btn" onclick="loginWithDiscord()">
                <img src="https://i.postimg.cc/Bb7GX5v3/Sans-titre-84-20260429130712.png"
                    alt="Se connecter avec Discord">
            </button>
            <div class="card-text">Ou connectez-vous avec votre compte Discord pour accéder au panel des Membres.</div>
            <button class="discord-btn" onclick="loginWithDiscordMember()">
                <img src="https://i.postimg.cc/qqDdzc74/Sans-titre-84-20260429130715.png"
                    alt="Se connecter avec Discord">
            </button>
        </div>

        <div class="footer">Powered by Uzy Hub Support bot</div>

    </div>
</div>

<script>
    const CLIENT_ID = "1489310793806774333";
    const REDIRECT_URI = "https://MMT-Entertaiment.github.io/callback.html";
    const SCOPE = "identify guilds.members.read";

    function loginWithDiscord() {
        const params = new URLSearchParams({
            client_id: CLIENT_ID,
            redirect_uri: REDIRECT_URI,
            response_type: "code",
            scope: SCOPE,
        });
        window.location.href = `https://discord.com/oauth2/authorize?${params}`;
    }

    const MEMBER_CLIENT_ID = "1499007774632185917";
    const MEMBER_REDIRECT_URI = "https://mmt-entertaiment.github.io/callbackmember.html";

    function loginWithDiscordMember() {
        const params = new URLSearchParams({
            client_id: MEMBER_CLIENT_ID,
            redirect_uri: MEMBER_REDIRECT_URI,
            response_type: "code",
            scope: SCOPE,
        });
        window.location.href = `https://discord.com/oauth2/authorize?${params}`;
    }

    if (localStorage.getItem('discord_token') && localStorage.getItem('discord_user')) {
        window.location.href = 'dashboard.html';
    }
    if (localStorage.getItem('member_token') && localStorage.getItem('member_user')) {
        window.location.href = 'panel_member.html';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion en cours...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0f13;
            color: #fff;
            font-family: 'Syne', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #ffffff10;
            border-top: 3px solid #5865F2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        p {
            color: #aaa;
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        .error {
            color: #ff4d4d;
            font-size: 14px;
            text-align: center;
            max-width: 300px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="spinner" id="spinner"></div>
    <p id="message">Authentification en cours...</p>

    <script>
        const WORKER_URL = "https://oauth2.uzydoorman.workers.dev";

        async function handleCallback() {
            // Si déjà connecté, rediriger directement
            if (localStorage.getItem('discord_token') && localStorage.getItem('discord_user')) {
                window.location.href = 'dashboard.html';
                return;
            }

            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            // Pas de code = lancer OAuth2
            if (!code) {
                const CLIENT_ID = "1489310793806774333";
                const REDIRECT_URI = "https://MMT-Entertaiment.github.io/callback.html";
                const oauthParams = new URLSearchParams({
                    client_id: CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    response_type: "code",
                    scope: "identify guilds.members.read",
                });
                window.location.href = `https://discord.com/oauth2/authorize?${oauthParams}`;
                return;
            }

            try {
                document.getElementById('message').textContent = "Échange du token...";

                // Étape 1 : Échanger le code contre un token
                const tokenRes = await fetch(`${WORKER_URL}/token`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code })
                });

                const tokenData = await tokenRes.json();

                if (!tokenData.access_token) {
                    showError("Erreur lors de la récupération du token. Redirection...");
                    setTimeout(() => window.location.href = 'index.html', 2000);
                    return;
                }

                document.getElementById('message').textContent = "Vérification des permissions...";

                // Étape 2 : Vérifier si l'utilisateur est admin
                const adminRes = await fetch(`${WORKER_URL}/check-admin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: tokenData.access_token })
                });

                const adminData = await adminRes.json();

                if (!adminData.isAdmin) {
                    showError("Accès refusé. Vous n'êtes pas administrateur. Redirection...");
                    setTimeout(() => window.location.href = 'index.html', 3000);
                    return;
                }

                // Étape 3 : Sauvegarder et rediriger
                localStorage.setItem('discord_token', tokenData.access_token);
                localStorage.setItem('discord_user', JSON.stringify(adminData.user));

                document.getElementById('message').textContent = "Accès autorisé ! Redirection...";
                setTimeout(() => window.location.href = 'dashboard.html', 1000);

            } catch (err) {
                showError("Une erreur est survenue. Veuillez réessayer.");
                setTimeout(() => window.location.href = 'index.html', 3000);
            }
        }

        function showError(msg) {
            document.getElementById('spinner').style.display = 'none';
            const p = document.getElementById('message');
            p.className = 'error';
            p.textContent = msg;
        }

        handleCallback();
    </script>
</body>
</html>

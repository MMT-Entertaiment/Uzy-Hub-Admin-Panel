<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzy Hub — Online Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0e;
            --surface: #0f1117;
            --border: #1f2230;
            --accent: #5865F2;
            --accent-glow: #5865F240;
            --text: #e8eaf2;
            --muted: #555870;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, #5865F215 0%, transparent 70%),
                radial-gradient(ellipse 40% 30% at 80% 80%, #5865F210 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            max-width: 360px;
            width: 100%;
        }

            to { opacity: 1; transform: translateY(0); }
        }

        .logo-img {
            width: 120px;
            max-width: 120px;
            height: 120px;
            max-height: 120px;
            object-fit: contain;
            border-radius: 24px;
        }

        .title {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .title-main {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: .08em;
            line-height: 1;
            color: var(--accent);
            text-align: center;
        }

        .title-sub {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: .15em;
            color: var(--muted);
            text-transform: uppercase;
            text-align: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .card-text {
            font-size: 13px;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }

        .discord-btn {
            display: block;
            width: 100%;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            transition: transform .15s, opacity .15s;
        }

        .discord-btn:active {
            transform: scale(0.97);
        }

        .discord-btn img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px;
        }

        .footer {
            font-size: 11px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            letter-spacing: .05em;
            text-align: center;
        }

        /* Fix animation fill-mode */
        .logo-img, .title, .card, .footer {
        }
    </style>
</head>
<body>

<div class="container">

    <img
        class="logo-img"
        src="https://cdn.discordapp.com/attachments/1462396944621240435/1497686891737383203/Sans_titre_13_20260117134917.png?ex=69ef15dc&is=69edc45c&hm=a3b4ef254c58a825655b94780ed283e4cec60a7ea6bd7ee9811fae0eb2f65841&"
        alt="Uzy Hub Logo" width="120" height="120" style="width:120px;height:120px;object-fit:contain;"
    >

    <div class="title">
        <div class="title-main">UZY HUB ONLINE PANEL</div>
        <div class="title-sub">Espace réservé aux administrateurs</div>
    </div>

    <div class="card">
        <div class="card-text">
            Connectez-vous avec votre compte Discord pour accéder au panel d'administration.
        </div>
        <button class="discord-btn" onclick="loginWithDiscord()">
            <img
                src="https://cdn.discordapp.com/attachments/1462396944621240435/1497991879122489535/Sans_titre_84_20260426180425.png?ex=69ef8927&is=69ee37a7&hm=d76ae884523019f273bc1a88baa67d530a3aa80ab1936e9ebd1d7156a73a2357&"
                alt="Se connecter avec Discord"
            >
        </button>
    </div>

    <div class="footer">Powered by Uzy Hub Support bot</div>

</div>

<script>
    const CLIENT_ID = "1489310793806774333";
    const REDIRECT_URI = "https://MMT-Entertaiment.github.io/callback.html";
    const SCOPE = "identify guilds.members.read";

    function loginWithDiscord() {
        const params = new URLSearchParams({
            client_id: CLIENT_ID,
            redirect_uri: REDIRECT_URI,
            response_type: "code",
            scope: SCOPE,
        });
        window.location.href = `https://discord.com/oauth2/authorize?${params}`;
    }

    // Si déjà connecté, rediriger directement vers le dashboard
    if (localStorage.getItem('discord_token') && localStorage.getItem('discord_user')) {
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
